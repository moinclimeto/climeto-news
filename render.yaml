services:
  - type: web
    name: agent-reach-dashboard
    env: docker
    plan: free
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agent-reach-db
          property: connectionString

databases:
  - name: agent-reach-db
    plan: free
    databaseName: agentreach
    user: agentreachuser
